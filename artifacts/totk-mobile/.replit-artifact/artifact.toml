kind = "mobile"
previewPath = "/totk-mobile/"
title = "TotK Guide Mobile"
version = "1.0.0"
id = "artifacts/totk-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/totk-mobile/" ]
localPort = 25783

[services.development]
run = "pnpm --filter @workspace/totk-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/totk-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/totk-mobile", "run", "serve" ]

[services.env]
PORT = "25783"
BASE_PATH = "/totk-mobile/"
